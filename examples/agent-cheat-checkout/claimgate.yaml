version: 1
name: agent-cheat-checkout

gates:
  - id: typecheck
    type: typescript
    description: TypeScript must compile
    options:
      command: pnpm exec tsc --noEmit

  - id: unit-tests
    type: vitest
    description: Must pass without skips
    options:
      command: pnpm exec vitest run
      testGlobs:
        - "tests/**/*.{test,spec}.ts"

  - id: env
    type: env
    description: Checkout secrets must be present
    options:
      examplePath: .env.example
      envPath: runtime.env

policy:
  bindToHead: true
  failOnSkippedTests: true
  failOnDeletedTests: true

evidence:
  packDir: .claimgate/packs
  retain: 10
