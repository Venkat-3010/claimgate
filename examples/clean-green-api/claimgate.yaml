version: 1
name: clean-green-api

gates:
  - id: typecheck
    type: typescript
    description: TypeScript must compile
    options:
      command: pnpm exec tsc --noEmit

  - id: unit-tests
    type: vitest
    description: All unit tests must pass without skips
    options:
      command: pnpm exec vitest run
      testGlobs:
        - "tests/**/*.{test,spec}.ts"

  - id: env
    type: env
    description: Runtime env matches .env.example contract
    options:
      examplePath: .env.example
      envPath: runtime.env

policy:
  bindToHead: true
  failOnSkippedTests: true
  failOnDeletedTests: true
  failOnEmptyTests: true

evidence:
  packDir: .claimgate/packs
  retain: 10
