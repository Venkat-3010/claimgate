name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Demo false-green catch
        working-directory: examples/false-green-demo
        run: |
          set +e
          pnpm exec claimgate verify
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            echo "Expected claimgate verify to fail on false-green demo"
            exit 1
          fi
          echo "False-green correctly rejected (exit $code)"
