name: Bug report
description: Report a bug in Claimgate
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Claimgate.
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Steps to reproduce, expected vs actual.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Relevant claimgate.yaml (redact secrets)
